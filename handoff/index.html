<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Bloom Culture — DIY Wedding Flower Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cabin:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Montserrat:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Archivo:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
/* ============ PALETTE (swap your brand colors here) ============ */
:root{
  --cream:        #f7f6f0;   /* app canvas — brand off-white */
  --cream-deep:   #eeece1;   /* slightly deeper bands */
  --paper:        #ffffff;   /* cards / surfaces */
  --ink:          #2c352a;   /* primary text — deep green-charcoal */
  --ink-soft:     #5d685a;   /* secondary text */
  --ink-faint:    #98a18f;   /* tertiary / mono labels */
  --line:         #e6e3d6;   /* hairlines */
  --line-strong:  #d6d2c3;

  --sage:         #384d39;   /* PRIMARY accent — brand forest green */
  --sage-deep:    #2b3c2c;
  --sage-tint:    #e7ece3;
  --rose:         #aa2138;   /* SECONDARY accent — brand raspberry */
  --rose-deep:    #8c1a2e;
  --rose-tint:    #f5e2e4;
  --clay:         #aa2138;   /* emergency uses the brand raspberry */
  --clay-tint:    #f5e2e4;
  --gold:         #b3934f;

  --accent:       var(--sage);
  --accent-deep:  var(--sage-deep);
  --accent-tint:  var(--sage-tint);

  --shadow-sm: 0 1px 2px rgba(58,52,44,.04), 0 1px 3px rgba(58,52,44,.05);
  --shadow-md: 0 4px 16px rgba(58,52,44,.06), 0 1px 4px rgba(58,52,44,.05);
  --shadow-lg: 0 18px 50px rgba(58,52,44,.13), 0 4px 14px rgba(58,52,44,.07);

  --serif: "Cabin", system-ui, sans-serif;        /* headings (brand) */
  --sans:  "Montserrat", system-ui, -apple-system, sans-serif;  /* body (brand) */
  --mono:  "Archivo", system-ui, sans-serif;       /* accent labels (brand) */

  --radius:  16px;
  --radius-sm: 10px;
  --radius-lg: 26px;
  --sidebar-w: 286px;
}

/* font scale knob from tweaks */
html{ font-size: 16px; }

*{ box-sizing: border-box; }
html,body{ margin:0; padding:0; }
body{
  font-family: var(--sans);
  background: var(--cream);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
::selection{ background: var(--accent-tint); color: var(--ink); }

h1,h2,h3,h4{ font-family: var(--serif); font-weight:500; line-height:1.08; margin:0; letter-spacing:-.01em; }
p{ margin:0; }
button{ font-family: inherit; cursor:pointer; border:none; background:none; color:inherit; }
a{ color: inherit; }
input, textarea{ font-family: inherit; }

.mono{ font-family: var(--mono); text-transform: uppercase; letter-spacing:.15em; font-size:11px; font-weight:600; }
.serif-it{ font-family: var(--serif); font-style: italic; }

/* scrollbar */
*::-webkit-scrollbar{ width:11px; height:11px; }
*::-webkit-scrollbar-thumb{ background:var(--line-strong); border-radius:8px; border:3px solid transparent; background-clip: padding-box; }
*::-webkit-scrollbar-thumb:hover{ background:var(--ink-faint); background-clip: padding-box; }

/* root mount fills viewport */
#root{ height:100vh; overflow:hidden; }

/* ---- generic focus ---- */
:focus-visible{ outline: 2px solid var(--accent-deep); outline-offset:2px; border-radius:4px; }

/* ---- responsive grids ---- */
.palette-grid{ display:grid; gap:10px; grid-template-columns:repeat(3, minmax(0,1fr)); }
.shop-grid{ display:grid; gap:14px; grid-template-columns:repeat(3, minmax(0,1fr)); }
.steps-grid{ display:grid; gap:16px; grid-template-columns:repeat(3, minmax(0,1fr)); }
.hchart-row{ display:grid; grid-template-columns:1.7fr 1fr 1.5fr 0.8fr; }
.cp-row{ display:grid; grid-template-columns:1.6fr 1fr 1fr 1fr; }
.moodboard-grid{ display:grid; gap:12px; grid-template-columns:repeat(4, minmax(0,1fr)); max-width:680px; }
@media (max-width:880px){
  .palette-grid{ grid-template-columns:repeat(2, minmax(0,1fr)); }
  .shop-grid{ grid-template-columns:repeat(2, minmax(0,1fr)); }
  .steps-grid{ grid-template-columns:repeat(2, minmax(0,1fr)); }
}
@media (max-width:600px){
  .palette-grid{ grid-template-columns:1fr; }
  .shop-grid{ grid-template-columns:1fr; }
  .steps-grid{ grid-template-columns:1fr; }
  .moodboard-grid{ grid-template-columns:repeat(2, minmax(0,1fr)); }
}

/* ============ PRINT ============ */
@media print{
  @page{ margin: 14mm; }
  body{ background:#fff; }
  .no-print{ display:none !important; }
  .print-area{ position:static !important; overflow:visible !important; height:auto !important; }
  .app-shell{ display:block !important; height:auto !important; overflow:visible !important; }
  .content-scroll{ overflow:visible !important; height:auto !important; padding:0 !important; }
  .day-body{ display:block !important; }

  /* print just one element (worksheet) */
  body.print-only .app-shell{ display:block !important; }
  body.print-only #root *{ visibility:hidden !important; }
  body.print-only .print-only-target, body.print-only .print-only-target *{ visibility:visible !important; }
  body.print-only .print-only-target{ position:absolute !important; left:0; top:0; width:100%; box-shadow:none !important; border:none !important; }
}
</style>
</head>
